<!doctype html>
<html lang="en">
<head><?php include __DIR__ . '/partials/head.html'; ?></head>
<body class="app-body">

<?php include __DIR__ . '/partials/topbar.html'; ?>

<div class="app-shell">
  <?php include __DIR__ . '/partials/sidebar.html'; ?>

  <main class="main-content">
    <div class="page-header">
      <a href="/groups" class="btn btn--ghost">&larr; Back</a>
      <h1 class="page-title">New Group</h1>
    </div>

    <div class="form-card">
      <form method="POST" action="/groups/create">

        <div class="form-group">
          <label class="form-label" for="name">Group name</label>
          <input
            class="form-input <?= isset($errors['name']) ? 'form-input--error' : '' ?>"
            type="text" id="name" name="name"
            value="<?= h($old['name'] ?? '') ?>"
            placeholder="e.g. Trip to Italy"
            maxlength="100"
          >
          <?php if (isset($errors['name'])): ?>
            <span class="form-error"><?= h($errors['name']) ?></span>
          <?php endif; ?>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select class="form-input" id="category" name="category">
              <?php foreach ($categories as $cat): ?>
                <option value="<?= h($cat) ?>" <?= ($old['category'] ?? 'general') === $cat ? 'selected' : '' ?>>
                  <?= h(ucfirst($cat)) ?>
                </option>
              <?php endforeach; ?>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="currency">Currency</label>
            <select class="form-input" id="currency" name="currency">
              <?php foreach ($currencies as $cur): ?>
                <option value="<?= h($cur) ?>" <?= ($old['currency'] ?? 'USD') === $cur ? 'selected' : '' ?>>
                  <?= h($cur) ?>
                </option>
              <?php endforeach; ?>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Members</label>
          <div class="members-list">
            <?php foreach ($users as $user): ?>
              <label class="member-item">
                <input
                  type="checkbox" name="members[]"
                  value="<?= h($user->id) ?>"
                  <?= in_array($user->id, array_map('intval', $old['members'] ?? [])) ? 'checked' : '' ?>
                >
                <span class="member-avatar"><?= h(strtoupper(substr($user->username, 0, 1))) ?></span>
                <span class="member-name"><?= h($user->username) ?></span>
              </label>
            <?php endforeach; ?>
          </div>
        </div>

        <div class="form-actions">
          <a href="/groups" class="btn btn--ghost">Cancel</a>
          <button type="submit" class="btn btn--primary">Create Group</button>
        </div>

      </form>
    </div>
  </main>
</div>

</body>
</html>
